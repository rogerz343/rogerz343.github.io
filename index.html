<!DOCTYPE html>
<html>

<head>
  <title>roger</title>
  <meta name="description" content="cool website">

  <link href="https://fonts.googleapis.com/css?family=Lato|Roboto" rel="stylesheet">
  <link rel="icon" href="./imgs/fb-winking-face.png">
  <link rel="stylesheet" type="text/css" href="./styles.css">
  <link rel="preload" as="image" href="imgs/nasa_webb_early_galaxies.png">
</head>
<script>
  // Given background color, returns whether text should be black or white.
  // http://stackoverflow.com/a/3943023/112731
  function getTxtColor(hex) {
    if (hex.indexOf('#') === 0) { hex = hex.slice(1); }
    if (hex.length === 3) { hex = hex[0] + hex[0] + hex[1] + hex[1] + hex[2] + hex[2]; }
    if (hex.length !== 6) { throw new Error('Invalid HEX color.'); }
    let r = parseInt(hex.slice(0, 2), 16);
    let g = parseInt(hex.slice(2, 4), 16);
    let b = parseInt(hex.slice(4, 6), 16);

    return (r * 0.299 + g * 0.587 + b * 0.114) > 186
      ? '#000000'
      : '#ffffff';
  }

  let backgrounds = [
    { type: "color", value: "#ccccf4" },
    { type: "color", value: "#ff9999" },
    { type: "color", value: "#444444" },
    { type: "image", value: "imgs/nasa_webb_cosmic_cliffs.jpg" },
    { type: "image", value: "imgs/nasa_webb_early_galaxies.jpg" },
    { type: "image", value: "imgs/nasa_webb_spiderweb.jpg" },
    { type: "image", value: "imgs/nasa_hubble_ngc_460.jpg" },
  ];
  let currentBg;

  let imagePaths = [
    "imgs/nasa_webb_cosmic_cliffs.jpg",
    "imgs/nasa_webb_early_galaxies.jpg",
    "imgs/nasa_webb_spiderweb.jpg",
    "imgs/nasa_hubble_ngc_460.jpg"
  ];
  imagePaths.forEach(src => {
    let img = new Image();
    img.src = src;
  });

  function changeBg(targetIndex) {
    let newBg;
    if (targetIndex !== undefined) {
      newBg = backgrounds[targetIndex];
    } else {
      newBg = backgrounds[Math.floor(Math.random() * backgrounds.length)];
      while (newBg === currentBg) {
        newBg = backgrounds[Math.floor(Math.random() * backgrounds.length)];
      }
    }
    currentBg = newBg;

    let body = document.getElementById("body-obj");

    if (newBg.type === "color") {
      body.style.backgroundColor = newBg.value;
      body.style.backgroundImage = "none";

      let txtColor = getTxtColor(newBg.value);
      let ps = document.getElementsByTagName("p");
      for (let i = 0; i < ps.length; i++) {
        ps[i].style.color = txtColor;
      }
    } else if (newBg.type === "image") {
      let img = new Image();
      img.src = newBg.value;
      img.onload = function () {
        body.style.backgroundImage = `url(${newBg.value})`;
        body.style.backgroundSize = "cover";
        body.style.backgroundPosition = "center";
        body.style.backgroundRepeat = "no-repeat";
        body.style.backgroundAttachment = "scroll"
      };

      // White text since images are just space.
      let ps = document.getElementsByTagName("p");
      for (let i = 0; i < ps.length; i++) {
        ps[i].style.color = "#ffffff";
      }
    }
  }
</script>

<body id="body-obj">
  <div class="main-container">
    <header id="big-name-header">
      <span class="big-letter" id="name_r1">r</span>

      <script>
        let emoji = "./imgs/fb-crying-face.png";
        let emojiPaths = [
          "./imgs/fb-crying-face.png",
          "./imgs/fb-disappointed-face.png",
          "./imgs/fb-winking-face.png",
          "./imgs/fb-anxious-face.png",
          "./imgs/fb-confused-face.png",
          "./imgs/fb-raised-eyebrow-face.png",
          "./imgs/fb-slightly-frown-face.png"
        ];
        function changeEmoji() {
          let newEmoji = emojiPaths[Math.floor(emojiPaths.length * Math.random())]
          while (newEmoji == emoji) {
            newEmoji = emojiPaths[Math.floor(emojiPaths.length * Math.random())]
          }
          emoji = newEmoji;
          document.getElementById("o-emoji").setAttribute("src", emoji);
        }

        function changeEmojiTarget(newEmoji) {
          emoji = newEmoji;
          document.getElementById("o-emoji").setAttribute("src", emoji);
        }
      </script>
      <span class="big-letter" id="name_o">
        <img id="o-emoji" style="transform: rotate(12deg)" width="120" height="120" src="./imgs/fb-crying-face.png"
          onclick="changeEmoji()">
      </span>

      <span class="big-letter" id="name_g">g</span>
      <span class="big-letter" id="name_e">e</span>
      <span class="big-letter" id="name_r2">r</span>
    </header>
    <main class="main-text">
      <p></p>
      <p onclick="changeBg()">wandering through the universe</p>
    </main>
  </div>
  <img id="floating-penguin" src="./imgs/penguin.png" alt="penguin" />
</body>
<script>
  changeBg(4);
  changeEmojiTarget("./imgs/fb-crying-face.png");
</script>
<script>
  //
  // for this entire section, sides [0, 1, 2, 3] are [top, right, bottom, left]
  function spawnOffscreen() {
    const side = Math.floor(Math.random() * 4);

    // avoid spawning too close to a corner, which could result in
    // the penguin only being on screen for a short amount of time
    const marginX = window.innerWidth * 0.15;
    const marginY = window.innerHeight * 0.15;

    let x, y;

    if (side === 0) {
      x = marginX + Math.random() * (window.innerWidth - 2 * marginX);
      y = -penguin.height;
    } else if (side === 1) {
      x = window.innerWidth;
      y = marginY + Math.random() * (window.innerHeight - 2 * marginY);
    } else if (side === 2) {
      x = marginX + Math.random() * (window.innerWidth - 2 * marginX);
      y = window.innerHeight;
    } else {
      x = -penguin.width;
      y = marginY + Math.random() * (window.innerHeight - 2 * marginY);
    }

    return { x, y, side };
  }

  // based on current side, go roughly towards opposite side
  function velocityFromSide(x, y, side) {
    const speed = 1 + Math.random();

    let vx = 0, vy = 0;

    if (side === 0) {
      vx = (Math.random() - 0.5);
      vy = Math.random();
    } else if (side === 1) {
      vx = -Math.random();
      vy = (Math.random() - 0.5);
    } else if (side === 2) {
      vx = (Math.random() - 0.5);
      vy = -Math.random();
    } else {
      vx = Math.random();
      vy = (Math.random() - 0.5);
    }

    // slight bias inward to avoid situation where we
    // just float near the border at shallow angle
    vx += (Math.random() - 0.5) * 0.3;
    vy += (Math.random() - 0.5) * 0.3;

    // normalize
    let len = Math.sqrt(vx * vx + vy * vy);
    return {
      x: (vx / len) * speed,
      y: (vy / len) * speed
    };
  }

  function isOffscreen() {
    return (
      pos.x > window.innerWidth ||
      pos.x < -penguin.width ||
      pos.y > window.innerHeight ||
      pos.y < -penguin.height
    );
  }

  function movePenguin() {
    if (isActive && isOffscreen()) {
      isActive = false;
      penguin.style.opacity = 0;
      respawnTime = performance.now() + (1000 + Math.random() * 2000);
    }

    if (!isActive) {
      if (performance.now() >= respawnTime) {
        const spawn = spawnOffscreen();

        pos.x = spawn.x;
        pos.y = spawn.y;
        velocity = velocityFromSide(pos.x, pos.y, spawn.side);
        rotationSpeed = (Math.random() - 0.5) * 0.5;

        penguin.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${rotation}deg)`;
        penguin.style.opacity = 1;
        isActive = true;
      }

      requestAnimationFrame(movePenguin);
      return;
    }

    pos.x += velocity.x;
    pos.y += velocity.y;
    rotation += rotationSpeed;
    penguin.style.transform = `translate(${pos.x}px, ${pos.y}px) rotate(${rotation}deg)`;

    requestAnimationFrame(movePenguin);
  }

  //
  // state variables
  //

  // start offscreen and wait a bit before first appearing
  let isActive = false;
  let respawnTime = performance.now() + 1000;

  // start animation once image is loaded
  const penguin = document.getElementById('floating-penguin');
  penguin.onload = () => {
    const spawn = spawnOffscreen();

    pos = { x: spawn.x, y: spawn.y };
    velocity = velocityFromSide(pos.x, pos.y, spawn.side);
    rotation = Math.random() * 360;
    rotationSpeed = (Math.random() - 0.5) * 0.5;

    movePenguin();
  };

  // Recalculate penguin size on window resize
  window.addEventListener('resize', () => {
    pos.x = Math.min(pos.x, window.innerWidth - 10);
    pos.y = Math.min(pos.y, window.innerHeight - 10);
  });
</script>

</html>
